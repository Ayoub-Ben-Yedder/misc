
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraclas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e1e2e;
      color: #e78284;
      margin: 0;
      display: grid;
      grid-template-columns: 1fr 4fr;
    }

    #drawing {
      height: 99vh;
    }

    canvas {
      border: 1px solid #f38ba8;
    }
  </style>
</head>

<body>
  <div id="controls">
    Angle :<input type="range" min="0" max="3.14" step="0.1" id="angle"><br>
    Length :<input type="range" min="0" max="600" step="5" id="length"><br>
    Color :<input type="color" id="clr" value="#ff0000"><br>
    Line Width :<input type="range" min="0" max="10" step="1" id="lw"><br>
  </div>
  <div id="drawing">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const min = 1;

    var angle;
    var len;
    var clr;
    var lw;

    initCanvas();

    function initCanvas() {
      canvas.width = document.getElementById("drawing").clientWidth;
      canvas.height = document.getElementById("drawing").clientHeight;
    }

    function line(x, y, x1, y1) {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }

    function draw(len, angle) {
      if (len < min) return;
      line(0, 0, 0, len);
      ctx.save();
      ctx.translate(0, len);
      ctx.rotate(angle);
      draw(len * 0.6, angle);
      ctx.restore();
      ctx.save();
      ctx.translate(0, len);
      ctx.rotate(-angle);
      draw(len * 0.6, angle);
      ctx.restore();
    }

    function frac(len, angle, clr, lw) {
      ctx.reset();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = clr;
      ctx.lineWidth = lw;
      ctx.translate(canvas.width / 2, canvas.height);
      ctx.scale(1, -1);
      draw(len, angle);
    }

    function updateParams() {
      angle = document.getElementById("angle").value;
      len = document.getElementById("length").value;
      clr = document.getElementById("clr").value;
      lw = document.getElementById("lw").value;
    }
    
    document.getElementById("angle").addEventListener("input", () => {
      updateParams();
      frac(len, angle, clr, lw);
    });

    document.getElementById("length").addEventListener("input", () => {
      updateParams();
      frac(len, angle, clr, lw);
    });

    document.getElementById("clr").addEventListener("input", () => {
      updateParams();
      frac(len, angle, clr, lw);
    });

    document.getElementById("lw").addEventListener("input", () => {
      updateParams();
      frac(len, angle, clr, lw);
    });

  </script>
</body>

</html>
